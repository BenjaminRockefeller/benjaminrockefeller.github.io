title: Benjamin Rockefeller
description: >-
  Researcher in AI, NLP, and Quant Finance.
baseurl: ""
url: "https://benjaminrockefeller.github.io"

theme: al-folio
remote_theme: alshedivat/al-folio

markdown: kramdown
highlighter: rouge

collections:
  projects:
    output: true
    permalink: /projects/:path/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-include-cache
  - jekyll-redirect-from
  - jekyll-remote-theme
  # - jekyll-archives  # 暂时禁用，防止 docs 相关错误

defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: project

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
